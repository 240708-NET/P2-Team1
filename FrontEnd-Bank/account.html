<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Information</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="account-container">
        <div class="welcome-message">
            <h1>Welcome, <span id="username">[Username]</span>!</h1>
            <p>Account Number: <span id="accountNumber">[Account Number]</span></p>
        </div>
        <div class="account-info">
            <div class="account-item" id="checking">
                <div class="account-header">Checking</div>
                <div class="account-details">
                    <p class="amount">$1000.00</p>
                </div>
            </div>
            <div class="account-item" id="savings">
                <div class="account-header">Savings</div>
                <div class="account-details">
                    <p class="amount">$3000.96</p>
                </div>
            </div>
        </div>
        <p><a href="index.html">Back to Login</a></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
